<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishi Setu | कृषी सेतू</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://kit.fontawesome.com/711cc87067.js" crossorigin="anonymous"></script>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Auth Overlay -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-emerald-900 bg-opacity-60 backdrop-blur-sm px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden">
            <button onclick="window.toggleLanguage()" class="absolute top-4 right-4 bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold border border-emerald-100 hover:bg-emerald-100 transition-colors">
                <i class="fas fa-language mr-1"></i> <span id="auth-lang-btn">मराठी</span>
            </button>

            <div class="text-center mb-8 pt-4">
                <div class="bg-emerald-100 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-4 rotate-3">
                    <i class="fa-solid fa-seedling text-emerald-600 text-4xl"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight" id="auth-title">Krishi Setu</h1>
                <p class="text-gray-500 mt-2 text-sm" id="auth-subtitle">Connecting Farmers to Markets</p>
            </div>

            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                <button onclick="window.handleLogin()" id="login-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-emerald-200 flex items-center justify-center space-x-2">
                    <span id="label-login">Login</span>
                </button>
                <p class="text-center mt-6 text-sm text-gray-600">
                    <span id="label-no-account">Don't have an account?</span> 
                    <a href="#" onclick="window.toggleAuthMode(false)" class="text-emerald-600 font-bold hover:underline" id="label-signup-link">Sign Up</a>
                </p>
            </div>

            <div id="signup-form" class="hidden space-y-4">
                <input type="text" id="signup-name" placeholder="Full Name" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                <input type="email" id="signup-email" placeholder="Email Address" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                <input type="password" id="signup-password" placeholder="Password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none">
                <button onclick="window.handleSignup()" id="signup-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
                    <span id="label-signup">Sign Up</span>
                </button>
                <p class="text-center mt-6 text-sm text-gray-600">
                    <span id="label-has-account">Already have an account?</span> 
                    <a href="#" onclick="window.toggleAuthMode(true)" class="text-emerald-600 font-bold hover:underline" id="label-login-link">Login</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-content" class="hidden pb-24">
        <nav class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-emerald-600 p-2 rounded-lg">
                        <i class="fas fa-wheat-awn text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-black text-xl text-emerald-900 leading-none">Krishi Setu</h1>
                        <span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">Market Distribution</span>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button onclick="window.toggleLanguage()" class="bg-emerald-50 text-emerald-700 px-4 py-2 rounded-xl text-sm font-bold border border-emerald-100 transition-colors hover:bg-emerald-100">
                        <span id="nav-lang-btn">मराठी</span>
                    </button>
                    <button onclick="window.handleLogout()" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-4 py-8">
            <div class="mb-10 bg-gradient-to-br from-emerald-600 to-teal-700 rounded-[2rem] p-8 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl font-bold mb-3" id="banner-title">Welcome to Krishi Setu</h2>
                    <p class="text-emerald-50 text-sm opacity-90 max-w-lg leading-relaxed" id="banner-desc">Empowering farmers with direct market access.</p>
                </div>
                <i class="fas fa-leaf absolute right-[-20px] top-[-20px] text-[15rem] text-white opacity-10 rotate-12"></i>
            </div>

            <!-- Admin Panel -->
            <div id="admin-panel" class="hidden mb-12">
                <div class="flex items-center space-x-2 mb-4">
                    <div class="w-2 h-6 bg-emerald-600 rounded-full"></div>
                    <h3 class="text-xl font-bold text-gray-800" id="admin-header">Admin Control Panel</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-md border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1" id="admin-label-name">Crop Name</label>
                        <input type="text" id="new-crop-name" class="w-full px-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1" id="admin-label-price">Price (₹/kg)</label>
                        <input type="number" id="new-crop-price" class="w-full px-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-gray-400 uppercase ml-1" id="admin-label-type">Category</label>
                        <select id="new-crop-type" class="w-full px-4 py-3 bg-gray-50 border-0 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="daily" id="opt-daily">Daily</option>
                            <option value="seasonal" id="opt-seasonal">Seasonal</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button onclick="window.updateCropPrice()" id="admin-update-btn" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 shadow-lg shadow-emerald-100 transition-all flex items-center justify-center">
                            <i class="fas fa-plus mr-2"></i> <span id="admin-btn-update">Add / Update Price</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex p-1.5 bg-white border border-gray-100 rounded-2xl w-fit mb-8 shadow-sm">
                <button onclick="window.switchTab('daily')" id="tab-daily" class="px-8 py-3 rounded-xl font-bold text-sm transition-all tab-active">Daily Prices</button>
                <button onclick="window.switchTab('seasonal')" id="tab-seasonal" class="px-8 py-3 rounded-xl font-bold text-sm transition-all text-gray-400 hover:text-emerald-600">Seasonal Crops</button>
            </div>

            <div id="prices-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 transition-all duration-500 z-[100]">
        <div class="bg-gray-900/90 backdrop-blur-md text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center space-x-3 border border-gray-700">
            <i class="fas fa-info-circle text-emerald-400"></i>
            <span id="toast-message" class="font-medium text-sm"></span>
        </div>
    </div>

    <script type="module" src="script.js">
    </script>
</body>
</html>
